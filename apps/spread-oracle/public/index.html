<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CS-AMM 利差机会中心</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="dashboard-shell">
      <aside class="sidebar glass-panel">
        <div class="sidebar-brand">
          <p class="eyebrow">CS-AMM</p>
          <strong>利差机会中心</strong>
        </div>
        <nav class="side-tabs" aria-label="主导航">
          <button class="side-tab active" data-view="overview" type="button">总览</button>
          <button class="side-tab" data-view="opportunities" type="button">利差机会</button>
          <button class="side-tab" data-view="exchanges" type="button">交易所列表</button>
          <button class="side-tab" data-view="markets" type="button">平台行情</button>
          <button class="side-tab" data-view="precheck" type="button">操作预案</button>
        </nav>
        <div class="sidebar-foot">
          <span>执行前预检</span>
          <strong id="sidebarPlatformCount">-</strong>
        </div>
      </aside>

      <section class="dashboard-main">
        <header class="topbar glass-panel">
          <div class="brand-block">
            <p class="eyebrow">跨平台饰品利差</p>
            <h1 id="viewTitle">总览</h1>
            <p class="topline" id="statusText">等待行情更新</p>
          </div>
          <div class="top-actions">
            <button id="refreshBtn" class="primary-button" type="button">刷新行情</button>
          </div>
        </header>

        <section class="view-panel active" data-view-panel="overview">
          <section class="summary-grid" aria-label="利差概览">
            <article class="metric glass-panel">
              <span>机会总数</span>
              <strong id="totalCount">-</strong>
            </article>
            <article class="metric glass-panel">
              <span>即时成交</span>
              <strong id="instantCount">-</strong>
            </article>
            <article class="metric glass-panel">
              <span>挂单观察</span>
              <strong id="theoreticalCount">-</strong>
            </article>
            <article class="metric glass-panel">
              <span>可操作机会</span>
              <strong id="strongCount">-</strong>
            </article>
            <article class="metric glass-panel">
              <span>最高净利率</span>
              <strong id="bestRate">-</strong>
            </article>
          </section>

          <section class="panel glass-panel">
            <div class="panel-title">
              <div>
                <p class="eyebrow">平台覆盖</p>
                <h2>市场目录</h2>
              </div>
            </div>
            <div id="platformCoverage" class="platform-coverage"></div>
          </section>
        </section>

        <section class="view-panel" data-view-panel="opportunities">
          <nav class="filters glass-panel" aria-label="机会筛选">
            <button class="filter active" data-filter="all" type="button">全部</button>
            <button class="filter" data-filter="instant" type="button">即时成交</button>
            <button class="filter" data-filter="theoretical" type="button">挂单观察</button>
            <button class="filter" data-filter="strong" type="button">可操作</button>
            <button class="filter" data-filter="watch" type="button">需复核</button>
          </nav>

          <section class="opportunity-controls glass-panel" aria-label="利差排序和交易所筛选">
            <label>
              <span>排序</span>
              <select id="sortMode">
                <option value="net-desc">净利差高到低</option>
                <option value="net-asc">净利差低到高</option>
                <option value="gross-desc">毛利差高到低</option>
                <option value="gross-asc">毛利差低到高</option>
                <option value="profit-desc">净利润高到低</option>
                <option value="fee-asc">手续费低到高</option>
              </select>
            </label>
            <label>
              <span>利差口径</span>
              <select id="spreadBasis">
                <option value="net">净利差</option>
                <option value="gross">毛利差</option>
              </select>
            </label>
            <label>
              <span>最低利差%</span>
              <input id="minSpread" inputmode="decimal" min="-100" step="0.01" type="number" />
            </label>
            <label>
              <span>最高利差%</span>
              <input id="maxSpread" inputmode="decimal" min="-100" step="0.01" type="number" />
            </label>
            <label>
              <span>卖出交易所</span>
              <select id="sellExchangeFilter">
                <option value="">任意</option>
              </select>
            </label>
            <label>
              <span>买入交易所</span>
              <select id="buyExchangeFilter">
                <option value="">任意</option>
              </select>
            </label>
            <button id="resetOpportunityFilters" class="ghost-button" type="button">重置</button>
          </section>

          <section class="panel glass-panel opportunity-panel">
            <div class="panel-title">
              <div>
                <p class="eyebrow">机会列表</p>
                <h2>利差机会</h2>
              </div>
              <span id="filterCount" class="panel-meta">-</span>
            </div>
            <div id="opportunityList" class="opportunity-list"></div>
          </section>
        </section>

        <section class="view-panel" data-view-panel="exchanges">
          <section class="panel glass-panel">
            <div class="panel-title">
              <div>
                <p class="eyebrow">交易所列表</p>
                <h2>平台连通性</h2>
              </div>
              <button id="refreshConnectivityBtn" class="ghost-button" type="button">刷新连通性</button>
            </div>
            <div id="exchangeSummary" class="exchange-summary"></div>
            <div id="exchangeList" class="exchange-list"></div>
          </section>
        </section>

        <section class="view-panel" data-view-panel="markets">
          <section class="panel glass-panel">
            <div class="panel-title">
              <div>
                <p class="eyebrow">报价矩阵</p>
                <h2>平台行情</h2>
              </div>
            </div>
            <div id="oracleList" class="oracle-list"></div>
          </section>
        </section>

        <section class="view-panel" data-view-panel="precheck">
          <section id="dryRunPanel" class="panel glass-panel dry-run">
            <div class="panel-title">
              <div>
                <p class="eyebrow">执行预检</p>
                <h2>操作预案</h2>
              </div>
              <button id="closeDryRun" class="ghost-button" type="button">清空</button>
            </div>
            <div id="dryRunContent" class="empty-state">选择一条利差机会后查看操作预案</div>
          </section>
        </section>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
